<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction | NIR8 Calculators</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --text: #555;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        .icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }

        p {
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .progress-container {
            background-color: #eee;
            border-radius: 20px;
            height: 10px;
            width: 100%;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--accent);
            height: 100%;
            width: 75%; /* Adjust this based on your actual progress */
            border-radius: 20px;
            transition: width 0.5s ease-in-out;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: var(--accent);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">⚙️</div>
        <h1>Enhancing Your Workflow</h1>
        <p>We are currently updating <strong>NIR8</strong> with advanced calculation modules and improved lot tracking features. We'll be back online shortly.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <a href="mailto:support@nir8.pages.dev" class="btn">Contact Support</a>

        <div class="footer-note">
            Estimated completion: April 2026<br>
            &copy; NIR8 Pharmaceutical Tools
        </div>
    </div>

</body>
</html>
