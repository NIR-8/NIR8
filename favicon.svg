<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4fd"/>
      <stop offset="100%" style="stop-color:#c8e6f7"/>
    </linearGradient>
  </defs>
  <!-- Light frosted background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle green bottom accent -->
  <rect x="14" y="52" width="36" height="4" rx="2" fill="#157347" opacity="0.7"/>
  <!-- NIR8 in deep navy -->
  <text x="32" y="43"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="20"
        font-weight="900"
        fill="#0a1628"
